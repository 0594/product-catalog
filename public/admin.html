<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理</title>
  <style>
    :root {
      --primary: #2563eb;
      --danger: #dc2626;
      --bg: #f8fafc;
      --card: #fff;
      --border: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); }
    .login-container { max-width: 400px; margin: 100px auto; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 1rem; display: none; }
    .tabs { display: flex; gap: 0.3rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1rem; background: #e2e8f0; border-radius: 6px 6px 0 0; cursor: pointer; }
    .tab.active { background: var(--primary); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: var(--card); }
    th, td { padding: 0.5rem; border: 1px solid var(--border); text-align: left; font-size: 0.85rem; }
    th { background: #f1f5f9; }
    .editable { cursor: pointer; }
    .editable input { width: 100%; padding: 0.2rem; }
    .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .progress { height: 20px; background: #e2e8f0; border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    .image-preview { width: 40px; height: 40px; object-fit: cover; }
  </style>
</head>
<body>
  <div class="login-container" id="loginBox">
    <h2>管理员登录</h2>
    <div id="captchaBox"><img id="captchaImg" src="/api/captcha" alt="验证码" onclick="this.src='/api/captcha?'+Date.now()"><br>
      <input type="text" id="captchaInput" placeholder="验证码">
    </div>
    <input type="password" id="passwordInput" placeholder="密码"><br><br>
    <button class="btn btn-primary" onclick="login()">登录</button>
  </div>

  <div class="admin-container" id="adminBox">
    <div class="tabs">
      <div class="tab active" data-tab="products">产品管理</div>
      <div class="tab" data-tab="categories">分类管理</div>
      <div class="tab" data-tab="banners">轮播图</div>
      <div class="tab" data-tab="settings">设置</div>
      <button class="btn btn-danger" onclick="logout()" style="margin-left:auto">退出</button>
    </div>

    <div class="tab-content active" id="tab-products">
      <div style="margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="showAddModal()">添加产品</button>
        <button class="btn btn-primary" onclick="document.getElementById('excelFile').click()">Excel导入</button>
        <input type="file" id="excelFile" accept=".xlsx" style="display:none" onchange="importExcel(this)">
        <a href="/api/products/template" class="btn" style="background:#f59e0b;color:#fff;">下载模板</a>
        <button class="btn btn-danger" onclick="batchDelete()">批量删除</button>
        <button class="btn" onclick="batchUpdate()">批量修改</button>
        <div class="progress" id="importProgress"><div class="progress-bar" id="progressBar"></div></div>
        <span id="progressText"></span>
      </div>
      <table id="productsTable">
        <thead><tr><th><input type="checkbox" id="selectAll"></th><th>SKU</th><th>中文名</th><th>英文名</th><th>价格1</th><th>价格2</th><th>分类</th><th>图片</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
      <div id="pagination" style="margin-top:1rem;"></div>
    </div>

    <div class="tab-content" id="tab-categories">
      <button class="btn btn-primary" onclick="addCategory()">新增分类</button>
      <table><thead><tr><th>ID</th><th>中文名</th><th>英文名</th><th>操作</th></tr></thead><tbody id="catTbody"></tbody></table>
    </div>

    <div class="tab-content" id="tab-banners">
      <input type="file" id="bannerFile" accept="image/*" onchange="uploadBanner()">
      <table><thead><tr><th>图片</th><th>排序</th><th>启用</th><th>操作</th></tr></thead><tbody id="bannerTbody"></tbody></table>
    </div>

    <div class="tab-content" id="tab-settings">
      <form id="settingsForm"></form>
    </div>
  </div>

  <script>
    let currentPage = 1;
    const base = '/api';

    // 登录相关
    async function checkAuth() {
      const res = await fetch(base + '/check-auth');
      const data = await res.json();
      if (data.loggedIn) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminBox').style.display = 'block';
        loadProducts();
      }
    }

    async function login() {
      const password = document.getElementById('passwordInput').value;
      const captcha = document.getElementById('captchaInput')?.value;
      const res = await fetch(base + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, captcha })
      });
      if (res.ok) checkAuth();
      else alert('登录失败');
    }

    async function logout() {
      await fetch(base + '/logout', { method: 'POST' });
      location.reload();
    }

    // 产品列表
    async function loadProducts(page = 1) {
      currentPage = page;
      const res = await fetch(base + '/products?page=' + page);
      const data = await res.json();
      const tbody = document.querySelector('#productsTable tbody');
      tbody.innerHTML = data.products.map(p => `
        <tr>
          <td><input type="checkbox" value="${p.id}" class="product-check"></td>
          <td class="editable" data-field="sku" data-id="${p.id}">${p.sku}</td>
          <td class="editable" data-field="name_zh" data-id="${p.id}">${p.name_zh}</td>
          <td class="editable" data-field="name_en" data-id="${p.id}">${p.name_en}</td>
          <td class="editable" data-field="price1" data-id="${p.id}">${p.price1}</td>
          <td class="editable" data-field="price2" data-id="${p.id}">${p.price2}</td>
          <td class="editable" data-field="category_id" data-id="${p.id}">${p.category_id}</td>
          <td><img src="${p.image || '/images/no-image.png'}" class="image-preview" onclick="editImage(${p.id})"></td>
          <td><button class="btn btn-danger" onclick="deleteProduct(${p.id})">删除</button></td>
        </tr>`).join('');

      document.querySelectorAll('.editable').forEach(td => {
        td.addEventListener('dblclick', function() {
          const original = this.innerText;
          this.innerHTML = `<input value="${original}" onblur="saveCell(this, '${this.dataset.field}', ${this.dataset.id}, '${original}')">`;
          this.querySelector('input').focus();
        });
      });
    }

    async function saveCell(input, field, id, original) {
      const value = input.value;
      if (value === original) { input.parentElement.innerText = original; return; }
      await fetch(base + '/products/' + id, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      });
      loadProducts(currentPage);
    }

    async function deleteProduct(id) {
      if (!confirm('确认删除？')) return;
      await fetch(base + '/products/' + id, { method: 'DELETE' });
      loadProducts(currentPage);
    }

    async function batchDelete() {
      const ids = [...document.querySelectorAll('.product-check:checked')].map(cb => cb.value);
      if (!ids.length) return alert('请选择产品');
      if (!confirm(`确认删除 ${ids.length} 个产品？`)) return;
      await fetch(base + '/products/batch/delete', {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids })
      });
      loadProducts(currentPage);
    }

    function batchUpdate() {
      const ids = [...document.querySelectorAll('.product-check:checked')].map(cb => cb.value);
      if (!ids.length) return alert('请选择产品');
      const price1 = prompt('新价格1（留空不修改）');
      const price2 = prompt('新价格2（留空不修改）');
      const cat = prompt('新分类ID（留空不修改）');
      const body = { ids };
      if (price1 !== null && price1 !== '') body.price1 = parseFloat(price1);
      if (price2 !== null && price2 !== '') body.price2 = parseFloat(price2);
      if (cat !== null && cat !== '') body.category_id = parseInt(cat);
      fetch(base + '/products/batch/update', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      }).then(() => loadProducts(currentPage));
    }

    // Excel导入 SSE
    function importExcel(input) {
      const file = input.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', base + '/products/import');
      xhr.setRequestHeader('Accept', 'text/event-stream');
      xhr.onprogress = function() {
        const responseText = xhr.responseText;
        const lines = responseText.split('\n').filter(l => l.startsWith('data: '));
        if (lines.length) {
          const last = JSON.parse(lines[lines.length-1].replace('data: ', ''));
          document.getElementById('progressBar').style.width = (last.processed / last.total * 100) + '%';
          document.getElementById('progressText').textContent = `已处理: ${last.processed}/${last.total} 成功: ${last.success} 跳过: ${last.skipped}`;
          if (last.done) { loadProducts(currentPage); }
        }
      };
      xhr.send(formData);
    }

    // 分类、轮播、设置等函数类似，为节省篇幅仅提供核心结构
    // 实际项目请扩展完整实现
    checkAuth();
  </script>
</body>
</html>
